[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
	"@openzeppelin/=lib/openzeppelin-contracts/",
	"@openzeppelin/contracts/token/ERC721/IERC721Metadata.sol=lib/openzeppelin-contracts/contracts/token/ERC721/extensions/IERC721Metadata.sol",
	"@openzeppelin/contracts/token/ERC721/IERC721Enumerable.sol=lib/openzeppelin-contracts/contracts/token/ERC721/extensions/IERC721Enumerable.sol",
	"@uniswap/v3-core/=lib/v3-core/",
	"@uniswap/v3-periphery/=lib/v3-periphery/",
	"forge-std/=lib/forge-std/src/"
]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 1000
depth = 15
fail_on_revert = false

[rpc_endpoints]
mainnet = "${ETHEREUM_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
