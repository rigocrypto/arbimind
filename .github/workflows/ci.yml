name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject npm lockfiles
        run: |
          changed_files=$(git diff-tree --no-commit-id --name-status -r HEAD)
          if echo "$changed_files" | grep -E '^[AMR].*(^|/)package-lock\.json$' >/dev/null; then
            echo 'package-lock.json additions/modifications are not allowed in this pnpm workspace.'
            echo "$changed_files" | grep -E 'package-lock\.json$' || true
            exit 1
          fi
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --if-present lint
      - run: pnpm --filter @arbimind/backend test --if-present
      - run: pnpm --filter @arbimind/bot test --if-present
      - run: pnpm --filter @arbimind/ui test --if-present
      - run: pnpm build
