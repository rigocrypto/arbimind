name: CI
on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Reject npm lockfiles changed in this PR
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '(^|/)package-lock\.json$' >/dev/null; then
            echo 'package-lock.json changes are not allowed in this pnpm workspace.'
            exit 1
          fi

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile --prefer-offline

      - name: Security audit (high-severity)
        run: |
          set +e
          pnpm audit --audit-level=high 2>&1 | tee audit.log
          audit_status=${PIPESTATUS[0]}
          set -e
          if [ "$audit_status" -eq 0 ]; then
            exit 0
          fi
          if grep -E 'ERR_PNPM_AUDIT_BAD_RESPONSE|ERR_PNPM_META_FETCH_FAIL|ECONNRESET|ETIMEDOUT|EAI_AGAIN|ENOTFOUND|Forbidden' audit.log >/dev/null; then
            echo 'pnpm audit endpoint was unavailable; continuing without masking real audit findings.'
            exit 0
          fi
          exit "$audit_status"

      # Keep the existing lint gate shape: only UI lint is currently clean on main.
      - run: pnpm --filter @arbimind/ui lint

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Foundry libs
        working-directory: packages/contracts
        run: |
          forge install OpenZeppelin/openzeppelin-contracts@v4.9.6
          forge install foundry-rs/forge-std@v1.5.0
          forge install Uniswap/v3-core@v1.0.0
          forge install Uniswap/v3-periphery@v1.3.0

      - name: Test (parallel)
        run: |
          set -euo pipefail
          pnpm --filter @arbimind/ui run test &
          ui_test_pid=$!
          pnpm --filter @arbimind/bot run test &
          bot_test_pid=$!
          pnpm --filter @arbimind/backend run test &
          backend_test_pid=$!
          wait $ui_test_pid
          wait $backend_test_pid
          wait $bot_test_pid

      - run: pnpm build
