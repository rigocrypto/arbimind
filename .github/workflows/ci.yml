name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:ts
      - run: pnpm run lint:ui
      - run: pnpm --filter @arbimind/backend test --if-present
      - run: pnpm --filter @arbimind/bot test --if-present
      - run: pnpm --filter @arbimind/ui test --if-present
      - run: pnpm build
