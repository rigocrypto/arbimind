name: CI
on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Reject npm lockfiles changed in this PR
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '(^|/)package-lock\.json$' >/dev/null; then
            echo 'package-lock.json changes are not allowed in this pnpm workspace.'
            exit 1
          fi

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile --prefer-offline

      - name: Security audit (high-severity)
        run: pnpm audit --audit-level=high

      # Keep the existing lint gate shape: only UI lint is currently clean on main.
      - run: pnpm --filter @arbimind/ui lint

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Foundry libs
        working-directory: packages/contracts
        run: |
          forge install OpenZeppelin/openzeppelin-contracts@v4.9.6
          forge install foundry-rs/forge-std@v1.5.0
          forge install Uniswap/v3-core@v1.0.0
          forge install Uniswap/v3-periphery@v1.3.0

      - name: Test (parallel)
        run: |
          set -euo pipefail
          pnpm --filter @arbimind/ui run test &
          ui_test_pid=$!
          pnpm --filter @arbimind/bot run test &
          bot_test_pid=$!
          pnpm --filter @arbimind/backend run test &
          backend_test_pid=$!
          wait $ui_test_pid
          wait $backend_test_pid
          wait $bot_test_pid

      - run: pnpm build
