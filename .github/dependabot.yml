version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      sentry:
        patterns:
          - "@sentry/*"
      next-framework:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: "deps"
      include: scope
